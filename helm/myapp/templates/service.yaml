apiVersion: v1
kind: Service
metadata:
  name: myapp
  labels:
    app: myapp

spec:
  type: {{ .Values.service.type }}
  selector:
    app: myapp

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
